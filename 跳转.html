<!DOCTYPE html>
<html>
<head>
    <title>跳转中...</title>
    <script>
        // 获取 URL 参数
        const urlParams = new URLSearchParams(window.location.search);
        const targetUrl = urlParams.get('url'); // 从参数中获取目标链接

        // 如果有目标链接，则跳转
        if (targetUrl) {
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 1000); // 1 秒后跳转
        } else {
            document.body.innerHTML = "<p>无效的跳转链接</p>";
        }
    </script>
</head>
<body>
    <p>正在跳转，请稍候...</p>
</body>
</html>
